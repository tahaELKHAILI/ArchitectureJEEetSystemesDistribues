<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Products</title>
</head>

<body>

<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h4 class="mb-0">Products</h4>

        <a class="btn btn-primary"
           th:href="@{/admin/newProduct}"
           sec:authorize="hasRole('ADMIN')">
            + Add Product
        </a>

    </div>

    <!-- 🔍 SEARCH BAR -->
    <form class="mb-3" method="get" th:action="@{/user/index}">

        <div class="input-group">

            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="Search product..."
                   th:value="${keyword}">

            <button class="btn btn-primary" type="submit">
                Search
            </button>

        </div>

    </form>

    <div class="card shadow-sm">

        <div class="card-body p-0">

            <table class="table table-hover align-middle mb-0">

                <thead class="table-light">

                <tr>
                    <th>ID</th>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                        Actions
                    </th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="product : ${productPage.content}">

                    <td th:text="${product.id}"></td>

                    <td class="fw-semibold" th:text="${product.name}"></td>

                    <td th:text="${product.price}"></td>

                    <td th:text="${product.quantity}"></td>

                    <td sec:authorize="hasRole('ADMIN')">

                        <div class="d-flex gap-2">

                            <a class="btn btn-sm btn-outline-primary"
                               th:href="@{/admin/update(id=${product.id})}">
                                Update
                            </a>

                            <form method="post"
                                  th:action="@{/admin/delete(id=${product.id})}">

                                <button type="submit"
                                        class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Are you sure you want to delete this product?')">
                                    Delete
                                </button>

                            </form>

                        </div>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

    <!-- PAGINATION -->
    <div class="d-flex justify-content-center mt-3">

        <nav>

            <ul class="pagination">

                <!-- Previous -->
                <li class="page-item"
                    th:classappend="${productPage.first} ? 'disabled'">

                    <a class="page-link"
                       th:href="@{/user/index(page=${productPage.number - 1}, keyword=${keyword})}">
                        Previous
                    </a>

                </li>

                <!-- Page numbers -->
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, productPage.totalPages - 1)}"
                    th:classappend="${i == productPage.number} ? 'active'">

                    <a class="page-link"
                       th:href="@{/user/index(page=${i}, keyword=${keyword})}"
                       th:text="${i + 1}">
                    </a>

                </li>

                <!-- Next -->
                <li class="page-item"
                    th:classappend="${productPage.last} ? 'disabled'">

                    <a class="page-link"
                       th:href="@{/user/index(page=${productPage.number + 1}, keyword=${keyword})}">
                        Next
                    </a>

                </li>

            </ul>

        </nav>

    </div>

</div>

</body>
</html>
